name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate HTML and XML
        run: |
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import xml.etree.ElementTree as ET
          import sys

          class Parser(HTMLParser):
              pass

          root = Path('.')
          html_files = [p for p in root.rglob('*.html') if '.git' not in p.parts]
          if not html_files:
              sys.exit('No HTML files found')

          for path in html_files:
              Parser().feed(path.read_text(encoding='utf-8', errors='strict'))

          sitemap = root / 'sitemap.xml'
          if sitemap.exists():
              ET.parse(sitemap)

          required = ['index.html', 'styles.css', 'quiz.js', 'questions.js', 'robots.txt', 'sitemap.xml']
          missing = [name for name in required if not (root / name).exists()]
          if missing:
              sys.exit('Missing required files: ' + ', '.join(missing))

          print(f'Validated {len(html_files)} HTML files')
          PY

  deploy:
    name: Deploy production
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name takken-sokuto-lab --branch main --commit-dirty=true
